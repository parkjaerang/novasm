<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 공통 스타일 + 서비스 전용 스타일 -->
  <link rel="stylesheet" href="./css/service.css">
  <link rel="icon" href="./img/novasm.png">
  <!-- 공통 헤더·푸터 주입 -->
  <script src="./js/common.js" defer></script>
  <script src="./js/service.js" defer></script>
  <title>NOVA SM</title>
</head>
<body>

  <!-- 헤더: common.js가 내용을 주입 -->
  <header class="ms_header"></header>

  <main>
    <!-- 서비스 소개 섹션 -->
    <section class="sv_hero">

      <!-- 좌측: 타이틀 블록 -->
      <div class="sv_title_block">
        <!-- 로고 장식 링 -->
        <div class="sv_logo_ring"><img src="./img/novasm.png" alt="Nova SM 로고"></div>
        <!-- 한글 메인 타이틀 -->
        <h1 class="sv_main_title">서비스 소개</h1>
        <!-- 골드 구분선 -->
        <div class="sv_divider"></div>
        <!-- 영문 서브라벨 -->
        <span class="sv_sub_label">Services</span>
      </div>

      <!-- 우측: 2×2 서비스 카드 그리드 -->
      <div class="sv_grid">

        <!-- 카드 1: SNS 채널 운영 전략 -->
        <article class="sv_card sv_card--1">
          <div class="sv_card_body">
            <p class="sv_card_text">
              브랜드의 타킷 고객과 가장
              효과적으로 소통할 수 있는<br>
              SNS 채널 운영 전략을 제공합니다.
            </p>
            <div class="sv_card_accent"></div>
          </div>
          <div class="sv_card_img"></div>
        </article>

        <!-- 카드 2: 영상 콘텐츠 제작 -->
        <article class="sv_card sv_card--2">
          <div class="sv_card_body">
            <p class="sv_card_text">
              브랜드의 전문성과 감성을 담은<br>
              고품질 영상 콘텐츠를 제작합니다.
            </p>
            <div class="sv_card_accent"></div>
          </div>
          <div class="sv_card_img"></div>
        </article>

        <!-- 카드 3: 비주얼 디자인 -->
        <article class="sv_card sv_card--3">
          <div class="sv_card_body">
            <p class="sv_card_text">
              브랜드 아이덴티티를 강화하는<br>
              차별화된 비주얼 디자인을 제공합니다.
            </p>
            <div class="sv_card_accent"></div>
          </div>
          <div class="sv_card_img"></div>
        </article>

        <!-- 카드 4: 중국 인플루언서 KOL/KOC 마케팅 -->
        <article class="sv_card sv_card--4">
          <div class="sv_card_body">
            <p class="sv_card_text">
              중국 현지 인플루언서 네트워크를 활용하여<br>
              브랜드 인지도와 신뢰도를 높입니다.
            </p>
            <div class="sv_card_accent"></div>
          </div>
          <div class="sv_card_img"></div>
        </article>

      </div><!-- /.sv_grid -->
    </section>
  </main>

  <!-- 푸터: common.js가 내용을 주입 -->
  <footer class="ms_footer"></footer>

</body>
</html>
