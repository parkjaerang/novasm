<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/index.css">
  <link rel="stylesheet" href="./css/whynovasm.css">
  <link rel="icon" href="./img/novasm.png">
  <script src="./js/common.js" defer></script>
  <script src="./js/whynovasm.js" defer></script>
  <title>NOVA SM</title>
</head>
<body>

  <!-- 헤더: common.js 주입 -->
  <header class="ms_header"></header>

  <main>

    <!-- WHY NOVA SM 섹션 -->
    <section class="wn_hero">

      <!-- 배경 골드 파티클 -->
      <div class="wn_particles" aria-hidden="true"></div>

      <!-- 5개 이유 메인 그리드 -->
      <div class="wn_grid">

        <!-- 1번 카드: 업계 경험 (좌상단) -->
        <!-- 이미지 삽입 시: wn_card_img--1에 background-image 스타일 추가 -->
        <article class="wn_card wn_card--1" data-delay="0">
          <div class="wn_card_img wn_card_img--1"></div>
          <div class="wn_card_body">
            <span class="wn_card_num">1.</span>
            <p class="wn_card_text">
              메디컬 에스테틱 분야에<br>
              특화된 풍부한 업계 경험과<br>
              운영 노하우
            </p>
          </div>
        </article>

        <!-- 중앙 제목 블록 (행 1~2 점유) -->
        <div class="wn_center">
          <div class="wn_center_circle" aria-hidden="true"></div>
          <div class="wn_center_content">
            <span class="wn_spark wn_spark--top" aria-hidden="true">✦</span>
            <h1 class="wn_title">
              한국 메디컬 브랜드가<br>
              <em>NOVA SM</em>을<br>
              선택하는 이유
            </h1>
            <span class="wn_spark wn_spark--mid" aria-hidden="true">✦</span>
          </div>
        </div>

        <!-- 2번 카드: 중국 마케팅 (우상단) -->
        <!-- 이미지 삽입 시: wn_card_img--2에 background-image 스타일 추가 -->
        <article class="wn_card wn_card--2" data-delay="100">
          <div class="wn_card_img wn_card_img--2"></div>
          <div class="wn_card_body">
            <span class="wn_card_num">2.</span>
            <p class="wn_card_text">
              중국 소비자 행동에 대한<br>
              깊은 이해와<br>
              현지화 마케팅 전략
            </p>
          </div>
        </article>

        <!-- 3번 카드: SNS 운영 (좌하단) -->
        <!-- 이미지 삽입 시: wn_card_img--3에 background-image 스타일 추가 -->
        <article class="wn_card wn_card--3" data-delay="200">
          <div class="wn_card_img wn_card_img--3"></div>
          <div class="wn_card_body">
            <span class="wn_card_num">3.</span>
            <p class="wn_card_text">
              브랜드 전략부터<br>
              콘텐츠, 광고, SNS 운영까지<br>
              브랜드 성장의 전 과정을<br>
              함께합니다.
            </p>
          </div>
        </article>

        <!-- 중앙 하단 스파크 (2행 중앙) -->
        <div class="wn_center_bottom" aria-hidden="true">
          <span class="wn_spark wn_spark--bottom">✦</span>
        </div>

        <!-- 4번 카드: 장기 협력 (우중단) -->
        <!-- 이미지 삽입 시: wn_card_img--4에 background-image 스타일 추가 -->
        <article class="wn_card wn_card--4" data-delay="300">
          <div class="wn_card_img wn_card_img--4"></div>
          <div class="wn_card_body">
            <span class="wn_card_num">4.</span>
            <p class="wn_card_text">
              서울 내 10개 이상의<br>
              메디컬 브랜드와<br>
              장기 협력
            </p>
          </div>
        </article>

        <!-- 하단 태그라인 (좌하단, 1~2열) -->
        <div class="wn_tagline">
          <p class="wn_tagline_sub">우리는 단순히 마케팅을 하지 않습니다.</p>
          <p class="wn_tagline_main">
            메디컬 브랜드의 성장을<br>
            디자인합니다.<span class="wn_tagline_spark" aria-hidden="true">✦</span>
          </p>
        </div>

        <!-- 5번 카드: 데이터 전략 (우하단) -->
        <!-- 이미지 삽입 시: wn_card_img--5에 background-image 스타일 추가 -->
        <article class="wn_card wn_card--5" data-delay="400">
          <div class="wn_card_img wn_card_img--5"></div>
          <div class="wn_card_body">
            <span class="wn_card_num">5.</span>
            <p class="wn_card_text">
              데이터 기반의 전략으로<br>
              실질적인 성과를<br>
              만듭니다.
            </p>
          </div>
        </article>

      </div><!-- /.wn_grid -->
    </section><!-- /.wn_hero -->

  </main>

  <!-- 공통 푸터: common.js 주입 -->
  <footer class="ms_footer"></footer>

</body>
</html>
